<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTrack • Rupee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { --primary: 59 130 246; }
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(17,24,39,0.95); }
        .nav-active { border-bottom: 3px solid rgb(var(--primary)); color: rgb(var(--primary)); font-weight: 600; }
        .amount-positive { color: #10b981; }
        .amount-negative { color: #ef4444; }
        .transaction-item:hover { transform: translateX(6px); }
        canvas { max-width: 100% !important; height: auto !important; }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-24">
    <div class="max-w-lg mx-auto bg-white dark:bg-zinc-900 min-h-screen shadow-2xl overflow-hidden">

        <!-- HEADER -->
        <header class="sticky top-0 z-50 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold">₹</div>
                    <div>
                        <h1 class="text-2xl font-semibold tracking-tight">FlowTrack</h1>
                        <p class="text-xs text-zinc-500 dark:text-zinc-400">Smart Expense Tracker</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="showCalculator()" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                        <i class="fas fa-calculator text-xl"></i>
                    </button>
                    <button onclick="toggleTheme()" id="theme-toggle" class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                        <i id="theme-icon" class="fas fa-moon text-xl"></i>
                    </button>
                </div>
            </div>

            <!-- Balance Card -->
            <div class="px-6 pb-6">
                <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-6 text-center shadow-inner">
                    <p class="text-sm text-zinc-500 dark:text-zinc-400 tracking-widest">CURRENT BALANCE</p>
                    <div id="balance" class="text-5xl font-semibold tracking-tighter mt-2 mb-1">₹0.00</div>
                    <div class="flex justify-center gap-8 mt-4">
                        <div class="text-center">
                            <div class="text-emerald-500 text-sm">INCOME</div>
                            <div id="total-income" class="font-semibold text-emerald-600">₹0</div>
                        </div>
                        <div class="text-center">
                            <div class="text-red-500 text-sm">EXPENSE</div>
                            <div id="total-expense" class="font-semibold text-red-600">₹0</div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- NAV -->
        <nav class="flex bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-[172px] z-40">
            <button onclick="switchTab(0)" id="tab-0" class="nav-active flex-1 py-4 text-sm flex flex-col items-center gap-1">
                <i class="fas fa-home"></i> <span>Home</span>
            </button>
            <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-4 text-sm flex flex-col items-center gap-1 text-zinc-500">
                <i class="fas fa-list"></i> <span>History</span>
            </button>
            <button onclick="switchTab(2)" id="tab-2" class="flex-1 py-4 text-sm flex flex-col items-center gap-1 text-zinc-500">
                <i class="fas fa-plus"></i> <span>Add</span>
            </button>
            <button onclick="switchTab(3)" id="tab-3" class="flex-1 py-4 text-sm flex flex-col items-center gap-1 text-zinc-500">
                <i class="fas fa-chart-pie"></i> <span>Analytics</span>
            </button>
        </nav>

        <main class="p-6">
            <!-- HOME -->
            <div id="content-0" class="tab-content">
                <h2 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-clock"></i> Recent</h2>
                <div id="recent-list" class="space-y-3"></div>
            </div>

            <!-- HISTORY -->
            <div id="content-1" class="tab-content hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-semibold">All Transactions</h2>
                    <button onclick="exportToExcel()" class="flex items-center gap-2 px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-2xl transition-colors">
                        <i class="fas fa-download"></i> Excel
                    </button>
                </div>
                <div id="transactions-list" class="space-y-3"></div>
            </div>

            <!-- ADD -->
            <div id="content-2" class="tab-content hidden">
                <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-8">
                    <h2 class="font-semibold text-xl mb-6 text-center">New Entry</h2>
                    
                    <div class="flex rounded-3xl bg-zinc-100 dark:bg-zinc-800 p-1 mb-8">
                        <button onclick="setType('expense')" id="btn-expense" class="flex-1 py-3.5 rounded-3xl font-medium text-red-600 bg-white shadow">Expense</button>
                        <button onclick="setType('income')" id="btn-income" class="flex-1 py-3.5 rounded-3xl font-medium text-emerald-600">Income</button>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm mb-2 text-zinc-500">Amount</label>
                            <div class="relative">
                                <span class="absolute left-6 top-4 text-3xl text-zinc-400">₹</span>
                                <input id="amount" type="number" step="0.01" placeholder="0.00" class="w-full pl-14 py-5 text-4xl font-semibold bg-zinc-100 dark:bg-zinc-800 rounded-3xl focus:outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm mb-2 text-zinc-500">Description</label>
                            <input id="description" type="text" placeholder="What was this?" class="w-full px-6 py-5 bg-zinc-100 dark:bg-zinc-800 rounded-3xl">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm mb-2 text-zinc-500">Date</label>
                                <input id="date" type="date" class="w-full px-6 py-5 bg-zinc-100 dark:bg-zinc-800 rounded-3xl">
                            </div>
                            <div id="cat-container">
                                <label class="block text-sm mb-2 text-zinc-500">Category</label>
                                <select id="category" class="w-full px-6 py-5 bg-zinc-100 dark:bg-zinc-800 rounded-3xl">
                                    <option value="Food">Food & Drink</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Bills">Bills</option>
                                    <option value="Health">Health</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <button onclick="addTransaction()" class="w-full mt-6 py-6 bg-blue-600 hover:bg-blue-700 text-white font-semibold text-lg rounded-3xl transition-colors">
                            Save Entry
                        </button>
                    </div>
                </div>
            </div>

            <!-- ANALYTICS -->
            <div id="content-3" class="tab-content hidden">
                <h2 class="font-semibold mb-6">Analytics</h2>
                
                <div class="glass rounded-3xl p-6 mb-8">
                    <h3 class="text-sm font-medium mb-4">This Week</h3>
                    <div id="week-summary" class="grid grid-cols-2 gap-4"></div>
                    <canvas id="week-chart" class="mt-6" height="150"></canvas>
                </div>

                <div class="glass rounded-3xl p-6">
                    <h3 class="text-sm font-medium mb-4">Spending by Category</h3>
                    <div class="flex justify-center">
                        <canvas id="pie-chart" height="240"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- FAB -->
    <button onclick="switchTab(2)" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white text-4xl shadow-2xl z-50 active:scale-95 transition-transform">
        <i class="fas fa-plus"></i>
    </button>

    <!-- CALCULATOR -->
    <div id="calc-modal" class="hidden fixed inset-0 bg-black/70 z-[999] flex items-end justify-center pb-10">
        <div class="glass w-full max-w-sm mx-4 rounded-3xl p-6">
            <input id="calc-display" readonly class="w-full text-right text-5xl font-light bg-transparent focus:outline-none mb-8">
            <div class="grid grid-cols-4 gap-3 text-2xl">
                <button onclick="calcInput('C')" class="py-6 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-2xl font-medium">C</button>
                <button onclick="calcInput('/')" class="py-6 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">÷</button>
                <button onclick="calcInput('*')" class="py-6 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">×</button>
                <button onclick="calcInput('-')" class="py-6 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">−</button>
                
                <button onclick="calcInput('7')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">7</button>
                <button onclick="calcInput('8')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">8</button>
                <button onclick="calcInput('9')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">9</button>
                <button onclick="calcInput('+')" class="py-6 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">+</button>
                
                <button onclick="calcInput('4')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">4</button>
                <button onclick="calcInput('5')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">5</button>
                <button onclick="calcInput('6')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">6</button>
                <button onclick="calcInput('1')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">1</button>
                <button onclick="calcInput('2')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">2</button>
                <button onclick="calcInput('3')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">3</button>
                <button onclick="calcInput('0')" class="py-6 bg-white dark:bg-zinc-800 col-span-2 rounded-2xl">0</button>
                <button onclick="calcInput('.')" class="py-6 bg-white dark:bg-zinc-800 rounded-2xl">.</button>
                <button onclick="calcEquals()" class="py-6 bg-blue-600 text-white rounded-2xl">=</button>
            </div>
            <button onclick="hideCalculator()" class="mt-8 w-full py-4 text-zinc-500 font-medium">Close Calculator</button>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('flowtrack_txns')) || [];
        let currentType = 'expense';
        let isDark = localStorage.getItem('darkMode') === 'true';
        let pieChartInstance = null;
        let weekChartInstance = null;

        function toggleTheme() {
            isDark = !isDark;
            localStorage.setItem('darkMode', isDark);
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
            document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
        }

        function saveTransactions() {
            localStorage.setItem('flowtrack_txns', JSON.stringify(transactions));
        }

        function calculateBalance() {
            let income = 0, expense = 0;
            transactions.forEach(t => {
                if (t.type === 'income') income += Number(t.amount);
                else expense += Number(t.amount);
            });
            document.getElementById('balance').textContent = '₹' + (income - expense).toFixed(2);
            document.getElementById('total-income').textContent = '₹' + income.toFixed(0);
            document.getElementById('total-expense').textContent = '₹' + expense.toFixed(0);
        }

        function deleteTransaction(id) {
            if (confirm("Delete this transaction permanently?")) {
                transactions = transactions.filter(t => t.id !== id);
                saveTransactions();
                refreshAll();
            }
        }

        function renderRecent() {
            const container = document.getElementById('recent-list');
            container.innerHTML = '';
            const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 6);
            if (sorted.length === 0) {
                container.innerHTML = `<div class="text-center py-16 text-zinc-400">No entries yet.<br>Tap the + button</div>`;
                return;
            }
            sorted.forEach(t => {
                const isIncome = t.type === 'income';
                const div = document.createElement('div');
                div.className = `transaction-item flex justify-between items-center bg-white dark:bg-zinc-800 border border-zinc-100 dark:border-zinc-700 rounded-3xl px-5 py-5`;
                div.innerHTML = `
                    <div class="flex gap-4 items-center">
                        <div class="w-11 h-11 rounded-2xl flex items-center justify-center ${isIncome ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">
                            <i class="fas ${isIncome ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                        </div>
                        <div>
                            <div class="font-medium">${t.description}</div>
                            <div class="text-xs text-zinc-500">${new Date(t.date).toLocaleDateString('en-IN', {month:'short', day:'numeric'})}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${isIncome ? 'amount-positive' : 'amount-negative'} font-semibold text-lg">
                            \( {isIncome ? '+' : '-'}₹ \){Number(t.amount).toFixed(2)}
                        </div>
                        <button onclick="deleteTransaction(${t.id}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-600 text-xs mt-1">delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function renderTransactions() {
            const container = document.getElementById('transactions-list');
            container.innerHTML = '';
            if (transactions.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-zinc-400">No transactions yet</div>`;
                return;
            }
            const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
            sorted.forEach(t => {
                const isIncome = t.type === 'income';
                const div = document.createElement('div');
                div.className = `transaction-item flex justify-between items-center bg-white dark:bg-zinc-800 border border-zinc-100 dark:border-zinc-700 rounded-3xl px-5 py-5`;
                div.innerHTML = `
                    <div class="flex gap-4 items-center flex-1">
                        <div class="w-11 h-11 rounded-2xl flex items-center justify-center ${isIncome ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">
                            <i class="fas ${isIncome ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                        </div>
                        <div class="flex-1">
                            <div class="font-medium">${t.description}</div>
                            <div class="text-xs text-zinc-500">${new Date(t.date).toLocaleDateString('en-IN')}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${isIncome ? 'amount-positive' : 'amount-negative'} font-semibold text-lg">
                            \( {isIncome ? '+' : '-'}₹ \){Number(t.amount).toFixed(2)}
                        </div>
                        <button onclick="deleteTransaction(${t.id}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-600 text-xs mt-1">delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function setType(type) {
            currentType = type;
            document.getElementById('btn-expense').classList.toggle('bg-white', type === 'expense');
            document.getElementById('btn-income').classList.toggle('bg-white', type === 'income');
        }

        function addTransaction() {
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value.trim();
            const date = document.getElementById('date').value;
            if (!amount || !description || !date) {
                alert("Please fill Amount, Description and Date");
                return;
            }
            transactions.push({
                id: Date.now(),
                type: currentType,
                amount: amount,
                description: description,
                date: date,
                category: document.getElementById('category').value
            });
            saveTransactions();
            refreshAll();
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            alert(currentType === 'income' ? "Income added successfully" : "Expense added successfully");
            switchTab(1);
        }

        function exportToExcel() {
            if (transactions.length === 0) {
                alert("No transactions to export");
                return;
            }
            const data = transactions.map(t => ({
                Date: t.date,
                Type: t.type.toUpperCase(),
                Description: t.description,
                Amount: Number(t.amount),
                Category: t.category || ''
            }));
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(data);
            const inc = transactions.filter(t => t.type === 'income').reduce((a, t) => a + Number(t.amount), 0);
            const exp = transactions.filter(t => t.type === 'expense').reduce((a, t) => a + Number(t.amount), 0);
            XLSX.utils.sheet_add_aoa(ws, [
                ["SUMMARY","","","",""],
                ["Total Income","","",inc,""],
                ["Total Expense","","",exp,""],
                ["Net Balance","","",(inc - exp),""],
                ["Generated on","","",new Date().toLocaleString('en-IN'),""]
            ], {origin: -1});
            XLSX.utils.book_append_sheet(wb, ws, "FlowTrack");
            XLSX.writeFile(wb, `FlowTrack_Statement_${new Date().toISOString().slice(0,10)}.xlsx`);
            alert("Excel file downloaded");
        }

        function refreshAll() {
            calculateBalance();
            renderRecent();
            renderTransactions();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach((b, i) => b.classList.toggle('nav-active', i === tab));
            if (tab === 3) {
                setTimeout(() => renderAnalytics(), 50);
            }
        }

        function renderAnalytics() {
            // Week summary
            const weekDiv = document.getElementById('week-summary');
            weekDiv.innerHTML = `<div class="text-center text-zinc-400">Weekly chart coming soon</div>`;
            
            // Pie chart
            if (pieChartInstance) pieChartInstance.destroy();
            const expenseByCat = {};
            transactions.filter(t => t.type === 'expense').forEach(t => {
                const cat = t.category || 'Other';
                expenseByCat[cat] = (expenseByCat[cat] || 0) + Number(t.amount);
            });
            const ctx = document.createElement('canvas');
            document.getElementById('pie-chart').parentElement.appendChild(ctx);
            pieChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(expenseByCat),
                    datasets: [{ data: Object.values(expenseByCat), backgroundColor: ['#ef4444','#f59e0b','#eab308','#22c55e','#3b82f6'] }]
                },
                options: { cutout: '65%', plugins: { legend: { position: 'bottom' } } }
            });
        }

        // Calculator
        let calcExpression = '';
        function showCalculator() {
            document.getElementById('calc-modal').classList.remove('hidden');
            calcExpression = '';
            document.getElementById('calc-display').value = '0';
        }
        function hideCalculator() {
            document.getElementById('calc-modal').classList.add('hidden');
        }
        function calcInput(val) {
            const disp = document.getElementById('calc-display');
            if (val === 'C') {
                calcExpression = '';
                disp.value = '0';
                return;
            }
            calcExpression += val;
            disp.value = calcExpression;
        }
        function calcEquals() {
            try {
                let result = eval(calcExpression.replace('×','*').replace('÷','/'));
                document.getElementById('calc-display').value = result;
                calcExpression = result.toString();
            } catch(e) {
                document.getElementById('calc-display').value = 'Error';
            }
        }

        function init() {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
            document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
            refreshAll();
            switchTab(0);
        }

        window.onload = init;
    </script>
</body>
</html>
