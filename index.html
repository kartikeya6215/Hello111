<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTrack • Rupee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(17,24,39,0.95); }
        .nav-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        .amount-positive { color: #10b981; }
        .amount-negative { color: #ef4444; }
        canvas { max-width: 100% !important; }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-20">
    <div class="max-w-lg mx-auto bg-white dark:bg-zinc-900 min-h-screen shadow-xl overflow-hidden">
        <header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-50">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">₹</div>
                    <div>
                        <h1 class="text-2xl font-semibold tracking-tight">FlowTrack</h1>
                        <p class="text-xs text-zinc-500 dark:text-zinc-400">Expense Tracker</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="showCalculator()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700">
                        <i class="fas fa-calculator"></i>
                    </button>
                    <button onclick="toggleTheme()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700">
                        <i id="theme-icon" class="fas fa-moon"></i>
                    </button>
                </div>
            </div>

            <div class="px-6 pb-6">
                <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-6 text-center">
                    <p class="text-sm text-zinc-500">Current Balance</p>
                    <div id="balance" class="text-5xl font-semibold tracking-tighter mt-1">₹0.00</div>
                    <div class="flex justify-center gap-8 mt-3 text-sm">
                        <div><span class="text-emerald-500">↑</span> <span id="total-income">₹0</span></div>
                        <div><span class="text-red-500">↓</span> <span id="total-expense">₹0</span></div>
                    </div>
                </div>
            </div>
        </header>

        <nav class="flex border-b border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 sticky top-[148px] z-40">
            <button onclick="switchTab(0)" id="tab-0" class="nav-active flex-1 py-4 text-sm font-medium">Home</button>
            <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-4 text-sm font-medium text-zinc-500">Transactions</button>
            <button onclick="switchTab(2)" id="tab-2" class="flex-1 py-4 text-sm font-medium text-zinc-500">Add</button>
            <button onclick="switchTab(3)" id="tab-3" class="flex-1 py-4 text-sm font-medium text-zinc-500">Analytics</button>
        </nav>

        <main class="p-6">
            <!-- HOME -->
            <div id="content-0" class="tab-content">
                <h2 class="font-semibold mb-4">Recent Activity</h2>
                <div id="recent-list" class="space-y-3"></div>
            </div>

            <!-- TRANSACTIONS -->
            <div id="content-1" class="tab-content hidden">
                <div class="flex justify-between mb-4">
                    <h2 class="font-semibold">All Transactions</h2>
                    <button onclick="exportToExcel()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-2xl flex items-center gap-2">
                        <i class="fas fa-download"></i> Excel
                    </button>
                </div>
                <div id="transactions-list" class="space-y-3"></div>
            </div>

            <!-- ADD TRANSACTION -->
            <div id="content-2" class="tab-content hidden">
                <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-8">
                    <h2 class="text-xl font-semibold mb-6 text-center">New Transaction</h2>
                    <div class="flex bg-zinc-100 dark:bg-zinc-800 rounded-3xl p-1 mb-8">
                        <button onclick="setType('expense')" id="type-expense" class="flex-1 py-3 rounded-3xl font-medium text-red-600 bg-white shadow-sm">Expense</button>
                        <button onclick="setType('income')" id="type-income" class="flex-1 py-3 rounded-3xl font-medium text-emerald-600">Income</button>
                    </div>
                    <div class="space-y-6">
                        <div>
                            <label class="text-sm text-zinc-500 block mb-1">Amount (₹)</label>
                            <div class="relative">
                                <span class="absolute left-5 top-4 text-3xl text-zinc-400">₹</span>
                                <input id="amount" type="number" step="0.01" class="w-full pl-12 py-4 text-3xl font-semibold bg-zinc-100 dark:bg-zinc-800 rounded-3xl focus:outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="text-sm text-zinc-500 block mb-1">Description</label>
                            <input id="description" type="text" placeholder="What was this for?" class="w-full px-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-sm text-zinc-500 block mb-1">Date</label>
                                <input id="date" type="date" class="w-full px-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl">
                            </div>
                            <div id="category-group">
                                <label class="text-sm text-zinc-500 block mb-1">Category</label>
                                <select id="category" class="w-full px-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl">
                                    <option value="Food">Food</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Bills">Bills</option>
                                    <option value="Health">Health</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="addTransaction()" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-3xl text-white font-semibold text-lg">Save Transaction</button>
                    </div>
                </div>
            </div>

            <!-- ANALYTICS -->
            <div id="content-3" class="tab-content hidden">
                <h2 class="font-semibold mb-6">Analytics</h2>
                <div class="glass rounded-3xl p-6 mb-6">
                    <canvas id="week-chart" height="160"></canvas>
                </div>
                <div class="glass rounded-3xl p-6">
                    <h3 class="font-medium mb-4">Spending by Category</h3>
                    <canvas id="pie-chart" height="220"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- FAB -->
    <button onclick="switchTab(2)" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 rounded-3xl flex items-center justify-center text-white text-4xl shadow-2xl z-50">
        <i class="fas fa-plus"></i>
    </button>

    <!-- CALCULATOR -->
    <div id="calc-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[200]">
        <div class="glass w-full max-w-xs mx-4 rounded-3xl p-6">
            <input id="calc-display" readonly class="w-full text-right text-4xl p-6 bg-white dark:bg-zinc-900 rounded-3xl mb-6">
            <div class="grid grid-cols-4 gap-3 text-xl">
                <button onclick="calcInput('C')" class="py-4 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-2xl">C</button>
                <button onclick="calcInput('/')" class="py-4 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">÷</button>
                <button onclick="calcInput('*')" class="py-4 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">×</button>
                <button onclick="calcInput('-')" class="py-4 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">−</button>
                <button onclick="calcInput('7')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">7</button>
                <button onclick="calcInput('8')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">8</button>
                <button onclick="calcInput('9')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">9</button>
                <button onclick="calcInput('+')" class="py-4 bg-amber-100 dark:bg-amber-900/30 text-amber-600 rounded-2xl">+</button>
                <button onclick="calcInput('4')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">4</button>
                <button onclick="calcInput('5')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">5</button>
                <button onclick="calcInput('6')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">6</button>
                <button onclick="calcInput('1')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">1</button>
                <button onclick="calcInput('2')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">2</button>
                <button onclick="calcInput('3')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">3</button>
                <button onclick="calcInput('0')" class="py-4 bg-white dark:bg-zinc-800 col-span-2 rounded-2xl">0</button>
                <button onclick="calcInput('.')" class="py-4 bg-white dark:bg-zinc-800 rounded-2xl">.</button>
                <button onclick="calcEquals()" class="py-4 bg-blue-600 text-white rounded-2xl">=</button>
            </div>
            <button onclick="hideCalculator()" class="mt-6 w-full py-3 text-zinc-500">Close</button>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('flowtrack_tx') || '[]');
        let currentType = 'expense';
        let isDark = localStorage.getItem('dark') === 'true';
        let pieChart = null, weekChart = null;

        function toggleTheme() {
            isDark = !isDark;
            localStorage.setItem('dark', isDark);
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
            document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
        }

        function saveTx() { localStorage.setItem('flowtrack_tx', JSON.stringify(transactions)); }

        function calculateBalance() {
            let inc = 0, exp = 0;
            transactions.forEach(t => t.type === 'income' ? inc += +t.amount : exp += +t.amount);
            document.getElementById('balance').textContent = '₹' + (inc - exp).toFixed(2);
            document.getElementById('total-income').textContent = '₹' + inc.toFixed(0);
            document.getElementById('total-expense').textContent = '₹' + exp.toFixed(0);
        }

        function deleteTx(id) {
            if (confirm("Delete this entry?")) {
                transactions = transactions.filter(t => t.id !== id);
                saveTx();
                refreshAll();
            }
        }

        function renderRecent() {
            const el = document.getElementById('recent-list');
            el.innerHTML = '';
            const recent = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,5);
            if (!recent.length) {
                el.innerHTML = `<div class="text-center py-12 text-zinc-400">No transactions yet</div>`;
                return;
            }
            recent.forEach(t => {
                const isInc = t.type === 'income';
                const div = document.createElement('div');
                div.className = `flex justify-between items-center bg-white dark:bg-zinc-800 p-4 rounded-3xl border border-zinc-100 dark:border-zinc-700`;
                div.innerHTML = `
                    <div class="flex gap-4">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">
                            <i class="fas ${isInc ? 'fa-plus' : 'fa-minus'}"></i>
                        </div>
                        <div>
                            <div class="font-medium">${t.description}</div>
                            <div class="text-xs text-zinc-500">${new Date(t.date).toLocaleDateString('en-IN')}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="\( {isInc ? 'amount-positive' : 'amount-negative'} font-semibold"> \){isInc?'+':'-'}₹${(+t.amount).toFixed(2)}</div>
                        <button onclick="deleteTx(${t.id});event.stopImmediatePropagation()" class="text-red-400 text-xs mt-1">Delete</button>
                    </div>
                `;
                el.appendChild(div);
            });
        }

        function renderTransactions() {
            const container = document.getElementById('transactions-list');
            container.innerHTML = '';
            if (!transactions.length) {
                container.innerHTML = `<div class="text-center py-20 text-zinc-400">No transactions yet</div>`;
                return;
            }
            transactions.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
                const isInc = t.type === 'income';
                const div = document.createElement('div');
                div.className = `flex justify-between items-center bg-white dark:bg-zinc-800 p-4 rounded-3xl border border-zinc-100 dark:border-zinc-700`;
                div.innerHTML = `
                    <div class="flex gap-4 flex-1">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isInc ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}">
                            <i class="fas ${isInc ? 'fa-plus' : 'fa-minus'}"></i>
                        </div>
                        <div class="flex-1">
                            <div class="font-medium">${t.description}</div>
                            <div class="text-xs text-zinc-500">${new Date(t.date).toLocaleDateString('en-IN')}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="\( {isInc ? 'amount-positive' : 'amount-negative'} font-semibold"> \){isInc?'+':'-'}₹${(+t.amount).toFixed(2)}</div>
                        <button onclick="deleteTx(${t.id});event.stopImmediatePropagation()" class="text-red-400 text-xs">Delete</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function setType(type) {
            currentType = type;
            document.getElementById('type-expense').classList.toggle('bg-white', type === 'expense');
            document.getElementById('type-income').classList.toggle('bg-white', type === 'income');
        }

        function addTransaction() {
            const amt = parseFloat(document.getElementById('amount').value);
            const desc = document.getElementById('description').value.trim();
            const date = document.getElementById('date').value;
            if (!amt || !desc || !date) return alert("Please fill all fields");
            transactions.push({
                id: Date.now(),
                type: currentType,
                amount: amt,
                description: desc,
                date: date,
                category: document.getElementById('category').value
            });
            saveTx();
            refreshAll();
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            showToast("Transaction saved");
            switchTab(1);
        }

        function exportToExcel() {
            if (!transactions.length) return showToast("No data", true);
            const wb = XLSX.utils.book_new();
            const data = transactions.map(t => ({
                Date: t.date,
                Type: t.type.toUpperCase(),
                Description: t.description,
                Amount: t.amount,
                Category: t.category || ''
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            XLSX.utils.sheet_add_aoa(ws, [["Total Income","","",transactions.filter(t=>t.type==='income').reduce((a,t)=>a+(+t.amount),0)]], {origin:-1});
            XLSX.utils.book_append_sheet(wb, ws, "FlowTrack");
            XLSX.writeFile(wb, `FlowTrack_${new Date().toISOString().slice(0,10)}.xlsx`);
            showToast("Downloaded");
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#18181b;color:white;padding:12px 24px;border-radius:9999px;z-index:1000';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function refreshAll() {
            calculateBalance();
            renderRecent();
            renderTransactions();
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + n).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach((b,i) => b.classList.toggle('nav-active', i===n));
        }

        // Calculator
        let calcExpr = '';
        function showCalculator() {
            document.getElementById('calc-modal').classList.remove('hidden');
            calcExpr = '';
            document.getElementById('calc-display').value = '0';
        }
        function hideCalculator() { document.getElementById('calc-modal').classList.add('hidden'); }
        function calcInput(v) {
            const disp = document.getElementById('calc-display');
            if (v === 'C') { calcExpr = ''; disp.value = '0'; return; }
            calcExpr += v;
            disp.value = calcExpr;
        }
        function calcEquals() {
            try {
                let res = eval(calcExpr.replace('×','*').replace('÷','/'));
                document.getElementById('calc-display').value = res;
                calcExpr = res.toString();
            } catch(e) { document.getElementById('calc-display').value = 'Error'; }
        }

        function init() {
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
            document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
            refreshAll();
            switchTab(0);
        }

        window.onload = init;
    </script>
</body>
</html>
