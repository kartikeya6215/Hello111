<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTrack • Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --primary: 59 130 246;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
        }
        
        .dark .glass {
            background: rgba(17, 24, 39, 0.95);
        }
        
        .nav-active {
            border-bottom: 3px solid rgb(var(--primary));
            color: rgb(var(--primary));
        }
        
        .transaction-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .transaction-item:hover {
            transform: translateX(4px);
        }
        
        .amount-positive {
            color: #10b981;
        }
        
        .amount-negative {
            color: #ef4444;
        }
        
        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(40px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen pb-20">
    <div class="max-w-lg mx-auto bg-white dark:bg-zinc-900 min-h-screen shadow-xl overflow-hidden">
        <!-- HEADER -->
        <header class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 sticky top-0 z-50">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">F</div>
                    <div>
                        <h1 class="text-2xl font-semibold tracking-tight">FlowTrack</h1>
                        <p class="text-xs text-zinc-500 dark:text-zinc-400 -mt-1">minimal expense tracker</p>
                    </div>
                </div>
                <div onclick="toggleTheme()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-zinc-100 dark:bg-zinc-800 cursor-pointer hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors">
                    <i id="theme-icon" class="fas fa-moon text-lg"></i>
                </div>
            </div>
            
            <!-- BALANCE -->
            <div class="px-6 pb-6">
                <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-6 text-center">
                    <p class="text-sm text-zinc-500 dark:text-zinc-400">Current Balance</p>
                    <div id="balance" class="text-5xl font-semibold tracking-tighter mt-1 mb-1">$2,847.32</div>
                    <div class="flex justify-center gap-6 text-sm">
                        <div class="flex items-center gap-1.5">
                            <span class="text-emerald-500">↑</span>
                            <span id="total-income" class="font-medium text-emerald-600">$4,120</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="text-red-500">↓</span>
                            <span id="total-expense" class="font-medium text-red-600">$1,273</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- NAV -->
        <nav class="flex border-b border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 sticky top-[140px] z-40">
            <button onclick="switchTab(0)" id="tab-0" class="nav-active flex-1 py-4 text-sm font-medium flex items-center justify-center gap-2">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-4 text-sm font-medium flex items-center justify-center gap-2 text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300">
                <i class="fas fa-list"></i>
                <span>Transactions</span>
            </button>
            <button onclick="switchTab(2)" id="tab-2" class="flex-1 py-4 text-sm font-medium flex items-center justify-center gap-2 text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300">
                <i class="fas fa-plus"></i>
                <span>Add</span>
            </button>
            <button onclick="switchTab(3)" id="tab-3" class="flex-1 py-4 text-sm font-medium flex items-center justify-center gap-2 text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300">
                <i class="fas fa-chart-pie"></i>
                <span>Reports</span>
            </button>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="p-6">
            
            <!-- TAB 0: HOME -->
            <div id="content-0" class="tab-content">
                <div class="mb-8">
                    <h2 class="font-semibold mb-4 flex items-center gap-2">
                        <i class="fas fa-clock"></i> Recent Activity
                    </h2>
                    <div id="recent-list" class="space-y-3">
                        <!-- populated by JS -->
                    </div>
                </div>
                
                <div>
                    <h2 class="font-semibold mb-4">Quick Stats</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-5">
                            <div class="text-emerald-600 text-sm font-medium">This Month Income</div>
                            <div id="month-income" class="text-3xl font-semibold mt-2">$3,240</div>
                        </div>
                        <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-5">
                            <div class="text-red-600 text-sm font-medium">This Month Spent</div>
                            <div id="month-expense" class="text-3xl font-semibold mt-2">$892</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- TAB 1: TRANSACTIONS -->
            <div id="content-1" class="tab-content hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-semibold">All Transactions</h2>
                    <div class="flex gap-2">
                        <select id="filter-type" onchange="filterTransactions()" class="bg-transparent text-sm border border-zinc-300 dark:border-zinc-700 rounded-2xl px-4 py-2 focus:outline-none">
                            <option value="all">All</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>
                
                <div id="transactions-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                    <!-- populated by JS -->
                </div>
            </div>
            
            <!-- TAB 2: ADD TRANSACTION -->
            <div id="content-2" class="tab-content hidden">
                <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-8">
                    <h2 class="font-semibold text-xl mb-6 text-center">New Transaction</h2>
                    
                    <div class="flex rounded-3xl bg-zinc-100 dark:bg-zinc-800 p-1 mb-8">
                        <button onclick="setType('expense')" id="type-expense" class="flex-1 py-3 rounded-3xl font-medium text-red-600 bg-white dark:bg-zinc-700 shadow-sm">Expense</button>
                        <button onclick="setType('income')" id="type-income" class="flex-1 py-3 rounded-3xl font-medium text-emerald-600">Income</button>
                    </div>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-zinc-500 mb-1.5">Amount</label>
                            <div class="relative">
                                <span class="absolute left-5 top-4 text-2xl font-light text-zinc-400">$</span>
                                <input id="amount" type="number" step="0.01" placeholder="0.00" class="w-full pl-12 pr-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl text-3xl font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm text-zinc-500 mb-1.5">Description</label>
                            <input id="description" type="text" placeholder="What was this for?" class="w-full px-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl focus:outline-none">
                        </div>
                        
                        <div id="payer-field" class="hidden">
                            <label class="block text-sm text-zinc-500 mb-1.5">From (Payer Name)</label>
                            <input id="payer" type="text" placeholder="John Doe" class="w-full px-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl focus:outline-none">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-zinc-500 mb-1.5">Date</label>
                                <input id="date" type="date" class="w-full px-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl focus:outline-none">
                            </div>
                            <div id="category-group">
                                <label class="block text-sm text-zinc-500 mb-1.5">Category</label>
                                <select id="category" class="w-full px-6 py-4 bg-zinc-100 dark:bg-zinc-800 rounded-3xl focus:outline-none">
                                    <option value="Food">Food &amp; Drink</option>
                                    <option value="Transport">Transport</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Bills">Bills &amp; Utilities</option>
                                    <option value="Health">Health</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <button onclick="addTransaction()" class="w-full bg-blue-600 hover:bg-blue-700 transition-colors text-white font-semibold py-5 rounded-3xl text-lg mt-4">
                            Save Transaction
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- TAB 3: REPORTS -->
            <div id="content-3" class="tab-content hidden">
                <h2 class="font-semibold mb-6">Monthly Overview</h2>
                
                <div class="glass border border-zinc-200 dark:border-zinc-700 rounded-3xl p-6 mb-8">
                    <div class="flex justify-between items-baseline mb-6">
                        <div>
                            <div class="text-sm text-zinc-500">Balance Trend</div>
                        </div>
                        <div class="text-xs bg-zinc-100 dark:bg-zinc-800 px-3 py-1 rounded-2xl">Last 30 days</div>
                    </div>
                    <canvas id="trend-chart" width="300" height="160"></canvas>
                </div>
                
                <h3 class="font-medium mb-4 text-sm uppercase tracking-widest text-zinc-500">Spending by Category</h3>
                <div id="category-breakdown" class="space-y-5">
                    <!-- populated by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- FAB -->
    <button onclick="switchTab(2)" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 hover:bg-blue-700 rounded-3xl shadow-2xl flex items-center justify-center text-white text-4xl z-50 transition-all active:scale-95">
        <i class="fas fa-plus"></i>
    </button>

    <!-- TOAST -->
    <div id="toast" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 bg-zinc-800 text-white text-sm px-6 py-3 rounded-3xl shadow-xl flex items-center gap-3">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span id="toast-text"></span>
    </div>

    <script>
        // Tailwind script already loaded via CDN
        
        let transactions = JSON.parse(localStorage.getItem('flowtrack_transactions')) || [];
        let currentTab = 0;
        let currentType = 'expense';
        let isDark = localStorage.getItem('darkMode') === 'true';
        
        function toggleTheme() {
            isDark = !isDark;
            localStorage.setItem('darkMode', isDark);
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
            document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
        }
        
        function saveTransactions() {
            localStorage.setItem('flowtrack_transactions', JSON.stringify(transactions));
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }
        
        function calculateBalance() {
            let income = 0;
            let expense = 0;
            
            transactions.forEach(t => {
                if (t.type === 'income') income += parseFloat(t.amount);
                else expense += parseFloat(t.amount);
            });
            
            const balance = income - expense;
            
            document.getElementById('balance').textContent = '$' + balance.toFixed(2);
            document.getElementById('total-income').textContent = '$' + income.toFixed(0);
            document.getElementById('total-expense').textContent = '$' + expense.toFixed(0);
            
            return { income, expense, balance };
        }
        
        function renderRecent() {
            const container = document.getElementById('recent-list');
            container.innerHTML = '';
            
            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            
            if (sorted.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-zinc-400">No transactions yet.<br>Add your first one!</div>`;
                return;
            }
            
            sorted.forEach(t => {
                const div = document.createElement('div');
                div.className = `transaction-item flex justify-between items-center bg-white dark:bg-zinc-800 border border-zinc-100 dark:border-zinc-700 rounded-3xl px-5 py-4`;
                
                const isIncome = t.type === 'income';
                
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isIncome ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900' : 'bg-red-100 text-red-600 dark:bg-red-900'}">
                            <i class="fas ${isIncome ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                        </div>
                        <div>
                            <div class="font-medium">${t.description}</div>
                            <div class="text-xs text-zinc-500">${formatDate(t.date)} ${t.category ? '• ' + t.category : ''}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${isIncome ? 'amount-positive' : 'amount-negative'} font-semibold">
                            ${isIncome ? '+' : '-'}\[ {parseFloat(t.amount).toFixed(2)}
                        </div>
                        \( {t.payer ? `<div class="text-xs text-zinc-400"> \){t.payer}</div>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function renderTransactions(filter = 'all') {
            const container = document.getElementById('transactions-list');
            container.innerHTML = '';
            
            let filtered = transactions;
            
            if (filter === 'income') filtered = transactions.filter(t => t.type === 'income');
            if (filter === 'expense') filtered = transactions.filter(t => t.type === 'expense');
            
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-zinc-400">No transactions match your filter.</div>`;
                return;
            }
            
            filtered.forEach((t, index) => {
                const div = document.createElement('div');
                div.className = `transaction-item flex justify-between items-center bg-white dark:bg-zinc-800 border border-zinc-100 dark:border-zinc-700 rounded-3xl px-5 py-4`;
                
                const isIncome = t.type === 'income';
                
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${isIncome ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-900' : 'bg-red-100 text-red-600 dark:bg-red-900'}">
                            <i class="fas ${isIncome ? 'fa-arrow-down' : 'fa-arrow-up'}"></i>
                        </div>
                        <div>
                            <div class="font-medium">${t.description}</div>
                            <div class="text-xs text-zinc-500">${formatDate(t.date)}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${isIncome ? 'amount-positive' : 'amount-negative'} font-semibold">
                            ${isIncome ? '+' : '-'} \]{parseFloat(t.amount).toFixed(2)}
                        </div>
                        \( {t.payer ? `<div class="text-xs text-emerald-600"> \){t.payer}</div>` : ''}
                        \( {t.category ? `<div class="text-xs text-zinc-400"> \){t.category}</div>` : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function filterTransactions() {
            const filter = document.getElementById('filter-type').value;
            renderTransactions(filter);
        }
        
        function renderCategoryBreakdown() {
            const container = document.getElementById('category-breakdown');
            container.innerHTML = '';
            
            const expenseByCat = {};
            
            transactions.filter(t => t.type === 'expense').forEach(t => {
                const cat = t.category || 'Other';
                if (!expenseByCat[cat]) expenseByCat[cat] = 0;
                expenseByCat[cat] += parseFloat(t.amount);
            });
            
            const totalExpense = Object.values(expenseByCat).reduce((a, b) => a + b, 0) || 1;
            
            Object.keys(expenseByCat).sort((a, b) => expenseByCat[b] - expenseByCat[a]).forEach(cat => {
                const amount = expenseByCat[cat];
                const percent = Math.round((amount / totalExpense) * 100);
                
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between text-sm mb-2">
                        <span>${cat}</span>
                        <span class="font-medium">$${amount.toFixed(0)}</span>
                    </div>
                    <div class="h-2 bg-zinc-200 dark:bg-zinc-700 rounded-full overflow-hidden">
                        <div class="h-full bg-red-500 rounded-full" style="width: ${percent}%"></div>
                    </div>
                `;
                container.appendChild(div);
            });
            
            if (Object.keys(expenseByCat).length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-zinc-400">No expense data yet</div>`;
            }
        }
        
        function setType(type) {
            currentType = type;
            
            document.getElementById('type-expense').classList.toggle('bg-white', type === 'expense');
            document.getElementById('type-expense').classList.toggle('dark:bg-zinc-700', type === 'expense');
            document.getElementById('type-income').classList.toggle('bg-white', type === 'income');
            document.getElementById('type-income').classList.toggle('dark:bg-zinc-700', type === 'income');
            
            document.getElementById('payer-field').classList.toggle('hidden', type !== 'income');
            document.getElementById('category-group').classList.toggle('hidden', type !== 'expense');
        }
        
        function addTransaction() {
            const amountInput = document.getElementById('amount');
            const description = document.getElementById('description').value.trim();
            const date = document.getElementById('date').value;
            const category = currentType === 'expense' ? document.getElementById('category').value : null;
            const payer = currentType === 'income' ? document.getElementById('payer').value.trim() : null;
            
            let amount = parseFloat(amountInput.value);
            
            if (!amount || !description || !date) {
                showToast("Please fill amount, description and date", true);
                return;
            }
            
            if (amount <= 0) {
                showToast("Amount must be greater than zero", true);
                return;
            }
            
            transactions.push({
                id: Date.now(),
                type: currentType,
                amount: amount,
                description: description,
                date: date,
                category: category,
                payer: payer
            });
            
            saveTransactions();
            refreshAll();
            
            // reset form
            amountInput.value = '';
            document.getElementById('description').value = '';
            document.getElementById('payer').value = '';
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            
            showToast(currentType === 'income' ? 'Income added ✓' : 'Expense recorded ✓');
            
            // switch to transactions tab after adding
            setTimeout(() => {
                switchTab(1);
            }, 800);
        }
        
        function showToast(message, error = false) {
            const toast = document.getElementById('toast');
            const text = document.getElementById('toast-text');
            text.textContent = message;
            toast.classList.remove('hidden');
            toast.style.backgroundColor = error ? '#b91c1c' : '#18181b';
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2800);
        }
        
        function simpleLineChart(canvasId, data) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const maxVal = Math.max(...data);
            const minVal = Math.min(...data);
            const range = maxVal - minVal || 1;
            
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.shadowColor = 'rgba(59, 130, 246, 0.4)';
            ctx.shadowBlur = 12;
            
            ctx.beginPath();
            
            for (let i = 0; i < data.length; i++) {
                const x = (i / (data.length - 1)) * (canvas.width - 30) + 15;
                const y = canvas.height - 25 - ((data[i] - minVal) / range) * (canvas.height - 60);
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // dots
            ctx.fillStyle = '#3b82f6';
            for (let i = 0; i < data.length; i++) {
                const x = (i / (data.length - 1)) * (canvas.width - 30) + 15;
                const y = canvas.height - 25 - ((data[i] - minVal) / range) * (canvas.height - 60);
                ctx.beginPath();
                ctx.arc(x, y, 4.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function generateFakeTrendData() {
            // simple decreasing then increasing demo
            return [920, 1340, 980, 1560, 1240, 1890, 1620, 2140];
        }
        
        function refreshAll() {
            calculateBalance();
            renderRecent();
            renderTransactions(document.getElementById('filter-type').value);
            renderCategoryBreakdown();
            
            // demo chart
            const trendData = generateFakeTrendData();
            simpleLineChart('trend-chart', trendData);
        }
        
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach((btn, i) => {
                if (i === tab) {
                    btn.classList.add('nav-active');
                } else {
                    btn.classList.remove('nav-active');
                }
            });
            
            if (tab === 3) {
                setTimeout(() => {
                    const trendData = generateFakeTrendData();
                    simpleLineChart('trend-chart', trendData);
                }, 100);
            }
        }
        
        // Initialize
        function init() {
            // Set today's date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
            
            // Dark mode
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').classList.remove('fa-moon');
                document.getElementById('theme-icon').classList.add('fa-sun');
            }
            
            // Sample data if empty
            if (transactions.length === 0) {
                transactions = [
                    {
                        id: 1723456789012,
                        type: "income",
                        amount: 1250,
                        description: "Salary deposit",
                        date: "2026-06-01",
                        payer: "Company Inc."
                    },
                    {
                        id: 1723456789013,
                        type: "expense",
                        amount: 45.5,
                        description: "Lunch at Cafe",
                        date: "2026-06-03",
                        category: "Food"
                    },
                    {
                        id: 1723456789014,
                        type: "expense",
                        amount: 120,
                        description: "Groceries",
                        date: "2026-06-04",
                        category: "Food"
                    },
                    {
                        id: 1723456789015,
                        type: "income",
                        amount: 320,
                        description: "Freelance project",
